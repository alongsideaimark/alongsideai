[build]
  publish = "."

# Internal working notes for the AI assistant — not a public page.
[[redirects]]
  from = "/CLAUDE.md"
  to = "/404.html"
  status = 404
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Pretty URLs: /legal, /guides, /questionnaire all work with or without trailing slash
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true
