[build]
  publish = "."

# Internal working notes for the AI assistant — not a public page.
[[redirects]]
  from = "/CLAUDE.md"
  to = "/404.html"
  status = 404
  force = true

# Pretty URL for plan previews: /plans/abc123 serves the rendered draft.
[[redirects]]
  from = "/plans/:id"
  to = "/.netlify/functions/view-plan?id=:id"
  status = 200

# The plan-drafting function reads the HTML template, the prompt, and the two
# sample plans at runtime. Tell Netlify's function bundler to ship those files
# with the function — otherwise they'd be missing and the function would crash.
[functions."generate-plan-background"]
  included_files = [
    "netlify/plan-template/template.html",
    "netlify/plan-template/prompt.md",
    "examples/semi-retired/index.html",
    "examples/busy-professional/index.html"
  ]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Pretty URLs: /legal, /guides, /questionnaire all work with or without trailing slash
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true
