[build]
  command = "npm test"
  publish = "."

# Internal working notes for the AI assistant — not a public page.
[[redirects]]
  from = "/CLAUDE.md"
  to = "/404.html"
  status = 404
  force = true

# Customer revision page: /revise/TOKEN serves the static HTML page.
# The page itself calls the validation + revision functions via fetch.
[[redirects]]
  from = "/revise/*"
  to = "/revise/index.html"
  status = 200

# Pretty URL for plan previews: /plans/abc123 serves the rendered draft.
# Uses a splat (*) rather than :id because Netlify doesn't always interpolate
# named placeholders into the query string portion of the "to" URL.
[[redirects]]
  from = "/plans/*"
  to = "/.netlify/functions/view-plan?id=:splat"
  status = 200

# The plan-drafting function reads the HTML template, the prompt, and the two
# sample plans at runtime. Tell Netlify's function bundler to ship those files
# with the function — otherwise they'd be missing and the function would crash.
[functions."generate-plan-background"]
  included_files = [
    "netlify/plan-template/template.html",
    "netlify/plan-template/prompt.md",
    "netlify/lib/reference-plans/gold-standard.html",
    "netlify/lib/reference-plans/semi-retired.html",
    "assets/plan.css"
  ]

[functions."view-plan"]
  included_files = [
    "netlify/plan-template/template.html",
    "assets/plan.css"
  ]

[functions."revise-plan-background"]
  included_files = [
    "netlify/plan-template/template.html",
    "netlify/plan-template/prompt.md",
    "netlify/lib/reference-plans/gold-standard.html",
    "netlify/lib/reference-plans/semi-retired.html",
    "assets/plan.css"
  ]

[functions."revise-plan-customer-background"]
  included_files = [
    "netlify/plan-template/template.html",
    "netlify/plan-template/prompt.md",
    "netlify/lib/reference-plans/gold-standard.html",
    "netlify/lib/reference-plans/semi-retired.html",
    "assets/plan.css"
  ]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Pretty URLs: /legal, /guides, /questionnaire all work with or without trailing slash
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true
