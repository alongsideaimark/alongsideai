<style>
  :root{
    --sage:#7B9E87;
    --sage-light:#A8C5B2;
    --sage-pale:#E8F0EB;
    --gold:#D4A853;
    --gold-light:#F2E6C9;
    --charcoal:#2C3330;
    --charcoal-soft:#4A5550;
    --cream:#FAF6F1;
    --white:#FFFFFF;
    --gray:#8A8780;

    --serif:"DM Serif Display", Georgia, serif;
    --sans:"Nunito", system-ui, Arial, sans-serif;
    --mono:"JetBrains Mono", ui-monospace, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--cream);
    color:var(--charcoal);
    font-family:var(--sans);
    font-size:18px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:flex; flex-direction:column;
  }
  a{color:inherit}
  h1,h2,h3{margin:0; font-weight:400}
  p{margin:0}

  /* ---------- top bar ---------- */
  header.bar{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 40px;
    border-bottom:1px solid color-mix(in oklab, var(--charcoal) 8%, transparent);
    background:var(--cream);
    position:sticky; top:0; z-index:5;
  }
  .brand{display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--charcoal)}
  .brand-mark{width:30px; height:36px}
  .brand-lockup{display:inline-flex; align-items:baseline; gap:10px; white-space:nowrap}
  .brand-word{font-family:var(--serif); font-size:24px; letter-spacing:-.01em; line-height:1}
  .brand-ai{font-family:var(--sans); font-weight:700; font-size:13px; letter-spacing:.24em; color:var(--sage); line-height:1}
  .exit{
    font-size:14px; color:var(--charcoal-soft); text-decoration:none;
    padding:10px 16px; border-radius:999px;
    border:1px solid color-mix(in oklab, var(--charcoal) 14%, transparent);
  }
  .exit:hover{color:var(--charcoal); border-color:var(--charcoal)}

  /* ---------- progress ---------- */
  .progress-wrap{padding:24px 40px 0}
  .progress-meta{
    display:flex; justify-content:space-between; align-items:center;
    font-family:var(--mono); font-size:11px; letter-spacing:.2em; text-transform:uppercase;
    color:var(--gray); margin-bottom:12px;
  }
  .progress-bar{
    height:4px; border-radius:999px;
    background:color-mix(in oklab, var(--charcoal) 8%, transparent);
    overflow:hidden; max-width:1100px; margin:0 auto;
  }
  .progress-fill{
    height:100%; background:var(--sage);
    transition:width .4s ease;
    border-radius:999px;
  }
  .progress-meta-inner{max-width:1100px; margin:0 auto; display:flex; justify-content:space-between; width:100%}

  /* ---------- page wrap ---------- */
  main{
    flex:1;
    display:flex; align-items:flex-start; justify-content:center;
    padding: 48px 40px 96px;
  }
  @media (max-width:720px){
    header.bar{padding:16px 22px}
    .progress-wrap{padding:20px 22px 0}
    main{padding: 32px 22px 120px}
  }

  .card{
    max-width: 760px; width:100%;
    background:var(--white);
    border:1px solid color-mix(in oklab, var(--charcoal) 7%, transparent);
    border-radius:18px;
    padding: 48px 52px 44px;
    box-shadow: 0 30px 80px -50px rgba(44,51,48,.2);
  }
  @media (max-width:720px){ .card{padding:32px 26px 30px} }

  .step-kicker{
    font-family:var(--mono);
    font-size:11px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--sage);
    display:flex; align-items:center; gap:12px;
    margin-bottom:18px;
  }
  .step-kicker::before{content:""; width:28px; height:1px; background:var(--sage)}

  .section-title{
    font-family:var(--serif);
    font-size: clamp(30px, 4vw, 40px);
    line-height:1.1;
    letter-spacing:-.015em;
    color:var(--charcoal);
    text-wrap:pretty;
    margin-bottom:14px;
  }
  .section-intro{
    color:var(--charcoal-soft);
    font-size:17px;
    max-width:620px;
    margin-bottom:8px;
  }

  /* ---------- question block (inside a section) ---------- */
  .question{
    padding-top:34px;
    margin-top:34px;
    border-top:1px solid color-mix(in oklab, var(--charcoal) 7%, transparent);
  }
  .question:first-of-type{ padding-top:34px; margin-top:34px }
  .q-label{
    display:block;
    font-family:var(--serif);
    font-size:22px;
    line-height:1.25;
    color:var(--charcoal);
    margin-bottom:8px;
    letter-spacing:-.005em;
  }
  .q-help{
    display:block;
    color:var(--charcoal-soft);
    font-size:15px;
    margin-bottom:16px;
    max-width:580px;
  }
  .q-required{
    color:var(--sage);
    font-family:var(--mono); font-size:10px; letter-spacing:.18em;
    text-transform:uppercase;
    margin-left:8px;
    font-weight:500;
    vertical-align:1px;
  }

  /* ---------- form fields ---------- */
  .input, textarea.input{
    width:100%;
    font-family:var(--sans);
    font-size:17px;
    padding:14px 16px;
    border:1px solid color-mix(in oklab, var(--charcoal) 16%, transparent);
    border-radius:10px;
    background:var(--cream);
    color:var(--charcoal);
    outline:none;
    transition: border-color .2s ease, background .2s ease;
  }
  .input:focus, textarea.input:focus{
    border-color:var(--sage);
    background:var(--white);
  }
  textarea.input{resize:vertical; min-height:108px; line-height:1.5}

  .choice-grid{
    display:grid; gap:12px;
    grid-template-columns: 1fr 1fr;
  }
  @media (max-width:540px){ .choice-grid{grid-template-columns:1fr} }
  .choice-grid.single{ grid-template-columns: 1fr }

  .choice{
    display:flex; align-items:flex-start; gap:14px;
    padding:16px 18px;
    border:1px solid color-mix(in oklab, var(--charcoal) 14%, transparent);
    border-radius:12px;
    background:var(--cream);
    cursor:pointer;
    transition: border-color .2s ease, background .2s ease;
  }
  .choice:hover{border-color:var(--sage); background:var(--white)}
  .choice input{position:absolute; opacity:0; pointer-events:none}
  .choice .check{
    width:20px; height:20px; border-radius:999px;
    border:1.5px solid color-mix(in oklab, var(--charcoal) 24%, transparent);
    flex-shrink:0; margin-top:2px;
    display:grid; place-items:center;
    transition: border-color .2s ease, background .2s ease;
  }
  .choice .check.square{border-radius:5px}
  .choice .check::after{
    content:""; width:10px; height:10px; border-radius:999px;
    background:var(--sage); transform:scale(0); transition:transform .2s ease;
  }
  .choice .check.square::after{border-radius:2px; width:12px; height:12px}
  .choice:has(input:checked){
    border-color:var(--sage); background:var(--sage-pale);
  }
  .choice:has(input:checked) .check{border-color:var(--sage); background:var(--white)}
  .choice:has(input:checked) .check::after{transform:scale(1)}
  .choice .body{font-size:16px; color:var(--charcoal); line-height:1.4}
  .choice .body small{display:block; font-size:13px; color:var(--gray); margin-top:3px; font-weight:400}
  .choice .body strong{font-weight:600}

  .followup{
    margin-top:14px;
    display:none;
  }
  .followup.open{ display:block }
  .followup .input{ margin-top:0 }

  /* ---------- nav buttons ---------- */
  .card-footer{
    margin-top:44px;
    padding-top:24px;
    border-top:1px solid color-mix(in oklab, var(--charcoal) 8%, transparent);
    display:flex; justify-content:space-between; align-items:center; gap:16px;
  }
  .btn{
    font-family:var(--sans);
    font-weight:600;
    font-size:16px;
    padding:15px 26px;
    border-radius:999px;
    border:none;
    cursor:pointer;
    display:inline-flex; align-items:center; gap:10px;
    transition: transform .2s ease, background .2s ease, color .2s ease;
  }
  .btn-primary{background:var(--charcoal); color:var(--cream)}
  .btn-primary:hover{transform:translateY(-1px); background:#1e2320}
  .btn-primary:disabled{opacity:.4; cursor:not-allowed; transform:none}
  .btn-ghost{background:transparent; color:var(--charcoal-soft); padding-left:6px}
  .btn-ghost:hover{color:var(--charcoal)}
  .btn-ghost .arrow-l{transform:rotate(180deg); display:inline-block}

  .skip-note{
    margin-top:18px;
    text-align:center;
    font-size:13px; color:var(--gray);
    font-style:italic;
  }

  /* ---------- intro / outro states ---------- */
  .intro-card, .done-card{
    max-width:760px; width:100%;
    text-align:left;
  }
  .intro-card .section-title, .done-card .section-title{font-size: clamp(36px, 5vw, 52px); margin-bottom:18px}
  .intro-bullets{
    margin-top:32px;
    display:flex; flex-direction:column; gap:14px;
  }
  .intro-bullet{
    display:flex; align-items:flex-start; gap:14px;
    font-size:17px; color:var(--charcoal-soft);
  }
  .intro-bullet .n{
    font-family:var(--serif); font-size:22px; color:var(--sage);
    line-height:1; width:28px; flex-shrink:0;
    letter-spacing:-.01em;
  }
  .intro-card .card-footer{margin-top:44px; border:none; padding:0; justify-content:flex-start}

  .done-mark{
    width:64px; height:64px; border-radius:999px;
    background:var(--sage-pale);
    display:grid; place-items:center;
    margin-bottom:28px;
  }
  .done-mark svg{width:28px; height:28px; color:var(--sage)}
  .done-detail{
    margin-top:36px;
    background:var(--sage-pale);
    border-radius:14px;
    padding:26px 28px;
  }
  .done-detail h4{font-family:var(--mono); font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--sage); font-weight:500; margin-bottom:14px}
  .done-detail ul{list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:10px}
  .done-detail li{font-size:16px; color:var(--charcoal); padding-left:22px; position:relative}
  .done-detail li::before{content:""; position:absolute; left:0; top:12px; width:10px; height:1px; background:var(--gold)}

  /* ---------- anim ---------- */
  .view{animation: slide-in .4s ease both}
  @keyframes slide-in{
    from{opacity:0; transform:translateY(8px)}
    to{opacity:1; transform:none}
  }

  /* ---------- footer ---------- */
  footer.foot{
    padding:24px 40px;
    border-top:1px solid color-mix(in oklab, var(--charcoal) 8%, transparent);
    font-size:13px; color:var(--gray);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px;
  }
  footer.foot a{color:inherit; text-decoration:underline}
</style>
</head>
<body>

<!--
  Hidden form for Netlify Forms detection.
  Netlify scans at deploy time. Every field that will ever be submitted must exist here by name,
  or it won't show up in the Forms dashboard. Real submission happens via fetch() from the JS flow below.
-->
<form name="questionnaire" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="bot-field" />
  <input type="text" name="name" />
  <input type="email" name="contact" />
  <input type="text" name="situation" />
  <input type="text" name="situation_other" />
  <input type="text" name="comfort" />
  <textarea name="work"></textarea>
  <input type="text" name="team" />
  <textarea name="typical_week"></textarea>
  <input type="text" name="location_today" />
  <input type="text" name="location_wanted" />
  <input type="text" name="devices" />
  <input type="text" name="subscriptions" />
  <input type="text" name="subscriptions_other" />
  <textarea name="data_lives"></textarea>
  <input type="text" name="tool_hated" />
  <textarea name="tool_hated_why"></textarea>
  <textarea name="friction"></textarea>
  <textarea name="manual_tasks"></textarea>
  <textarea name="already_tried"></textarea>
  <input type="text" name="inbox" />
  <input type="text" name="inbox_note" />
  <textarea name="wish"></textarea>
  <textarea name="success_6mo"></textarea>
  <input type="text" name="priority" />
  <input type="text" name="tried_ai" />
  <textarea name="nervous"></textarea>
  <input type="text" name="cloud_comfort" />
  <input type="text" name="cloud_comfort_note" />
  <input type="text" name="urgency" />
  <input type="text" name="budget_posture" />
  <textarea name="anything_else"></textarea>
</form>

<header class="bar">
  <a href="/" class="brand" aria-label="Alongside AI home">
    <img class="brand-mark" src="/assets/logo-mark.svg" alt=""/>
    <span class="brand-lockup"><span class="brand-word">alongside</span><span class="brand-ai">AI</span></span>
  </a>
  <a href="/" class="exit">Save &amp; finish later</a>
</header>

<div class="progress-wrap" id="progress-wrap" style="display:none">
  <div class="progress-meta-inner">
    <span id="progress-label">Section 1 of 7</span>
    <span id="progress-pct">0% done</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<main>
  <div id="app"></div>
</main>

<footer class="foot">
  <div>Your answers are private. We only use them to write your plan.</div>
  <div>© 2026 Alongside AI LLC</div>
</footer>

<script>
/* ---------- sections & questions ----------
   Every question has a stable id (used as the Netlify form field name).
   Required fields are rare: only `name` in S1 and `contact` in S7.
   Everything else is skippable by design — that's the ethos.
   Each radio/checkbox option has a `value` that's the id saved to the form,
   and a `label` that's shown both in the UI and in the internal notification email.
*/
const SECTIONS = [
  { kind: "intro" },

  {
    id: "s1",
    kicker: "Section 1 of 7",
    title: "About you",
    intro: "A few quick things so we know who we're writing for.",
    questions: [
      {
        id: "name",
        label: "First, what should we call you?",
        help: "Just a first name is fine. We'll address the plan to you.",
        required: true,
        field: { kind: "text", placeholder: "First name", autofocus: true }
      },
      {
        id: "situation",
        label: "Which of these sounds most like you right now?",
        help: "Pick the closest one. We'll get to the nuance in a minute.",
        field: {
          kind: "radio",
          options: [
            { value: "business", label: "Running a small business", hint: "Solo or with a small team." },
            { value: "semi_retired", label: "Semi-retired, or winding down", hint: "Still working, but slowing the pace." },
            { value: "retired", label: "Fully retired, but active", hint: "Travel, family, projects, causes." },
            { value: "professional", label: "A busy professional inside a bigger company", hint: "Not technical, and overwhelmed." },
            { value: "helping", label: "Helping a parent or family member", hint: "You're the one figuring this out for them." },
            { value: "other", label: "Something else", hint: "Tell us a little more.", reveal: "situation_other" }
          ]
        }
      },
      {
        id: "situation_other",
        hidden: true, // only shown when situation === "other"
        revealIf: { field: "situation", equals: "other" },
        label: "Tell us a bit more.",
        help: "A line or two is plenty.",
        field: { kind: "text", placeholder: "I run a nonprofit board…" }
      },
      {
        id: "comfort",
        label: "How do you feel about technology in general?",
        help: "No wrong answers. This just helps us match our pace to yours.",
        field: {
          kind: "radio",
          options: [
            { value: "avoid", label: "I avoid it when I can", hint: "Mostly frustrating." },
            { value: "basics", label: "I can handle the basics", hint: "Email, texts, a few apps — but I get stuck." },
            { value: "okay", label: "I'm okay, but I want to do more", hint: "I know there's more I could be doing." },
            { value: "comfortable", label: "I'm pretty comfortable, just busy", hint: "I don't have the time to figure it out." }
          ]
        }
      }
    ]
  },

  {
    id: "s2",
    kicker: "Section 2 of 7",
    title: "Your world and how you work",
    intro: "The shape of your week. Any good plan starts here.",
    questions: [
      {
        id: "work",
        label: "In a sentence or two, what do you do — or what did you do?",
        help: "We just want a sense of your world.",
        field: { kind: "textarea", placeholder: "I own a few commercial properties in Pasadena and handle most things myself…" }
      },
      {
        id: "team",
        label: "Who else is involved in the day-to-day?",
        field: {
          kind: "radio",
          options: [
            { value: "solo", label: "Just me" },
            { value: "partner", label: "Me and a spouse or partner" },
            { value: "small", label: "Me and a small team (2 to 10 people)" },
            { value: "larger", label: "A larger team or company" }
          ]
        }
      },
      {
        id: "typical_week",
        label: "Walk us through a typical week.",
        help: "Where does most of your time go? What's Monday vs. Friday? If Tuesday morning is sacred because you do payroll, tell us that.",
        field: { kind: "textarea", placeholder: "Mondays are pretty quiet. Tuesday and Wednesday I'm on job sites. Thursdays I catch up on paperwork…" }
      },
      {
        id: "location_today",
        label: "Where do you do most of your work from today?",
        field: {
          kind: "radio",
          options: [
            { value: "office", label: "An office I drive to" },
            { value: "home", label: "A home office" },
            { value: "mix", label: "A mix of the two" },
            { value: "anywhere", label: "Wherever I happen to be that day" }
          ]
        }
      },
      {
        id: "location_wanted",
        label: "And where would you like to be able to work from, if the tools supported it?",
        help: "A coffee shop. A beach. A grandkid's living room. Be honest.",
        field: { kind: "text", placeholder: "Anywhere with an internet connection, honestly…" }
      }
    ]
  },

  {
    id: "s3",
    kicker: "Section 3 of 7",
    title: "Your current setup",
    intro: "Just so we don't recommend something you already own — and so we know what we're working with.",
    questions: [
      {
        id: "devices",
        label: "What devices do you actually use?",
        help: "Pick any that apply.",
        field: {
          kind: "checkbox",
          options: [
            { value: "iphone", label: "iPhone" },
            { value: "android", label: "Android phone" },
            { value: "ipad", label: "iPad or tablet" },
            { value: "mac", label: "Mac laptop or desktop" },
            { value: "pc", label: "Windows PC" },
            { value: "none", label: "I mostly avoid computers" }
          ]
        }
      },
      {
        id: "subscriptions",
        label: "What software or apps do you currently pay for?",
        help: "Don't worry about being exact. This just helps us avoid recommending something you already own.",
        field: {
          kind: "checkbox",
          options: [
            { value: "m365", label: "Microsoft 365 or Office" },
            { value: "google", label: "Google Workspace or business Gmail" },
            { value: "accounting", label: "QuickBooks, Xero, or other accounting software" },
            { value: "storage", label: "Dropbox, iCloud, or Google Drive (paid)" },
            { value: "ai", label: "ChatGPT, Claude, or another AI subscription" },
            { value: "sign", label: "Something for signing documents (DocuSign, Adobe)" },
            { value: "bills", label: "Something for paying bills online" },
            { value: "crm", label: "A CRM or contact manager" },
            { value: "scheduling", label: "A scheduling tool (Calendly and similar)" },
            { value: "invoicing", label: "Invoicing or billing software" },
            { value: "passwords", label: "A password manager" },
            { value: "email_marketing", label: "Email marketing (Mailchimp, Constant Contact)" },
            { value: "project", label: "Project or task management (Asana, Trello, Notion)" },
            { value: "industry", label: "Industry-specific software (tell us below)" },
            { value: "unsure", label: "Honestly, I'm not sure what I pay for" }
          ]
        }
      },
      {
        id: "subscriptions_other",
        label: "Anything else worth mentioning?",
        help: "Optional. Especially industry software or anything unusual.",
        field: { kind: "text", placeholder: "AppFolio, Clio, Mindbody…" }
      },
      {
        id: "data_lives",
        label: "Where do your important files and data actually live?",
        help: "Be honest about the real picture. Some people say 'a filing cabinet and a shoebox.' Others say 'Google Drive, QuickBooks, and my assistant's brain.' Both are useful answers.",
        field: { kind: "textarea", placeholder: "Books in QuickBooks Desktop on the office computer. Leases in a filing cabinet. Contacts in my phone and in Outlook…" }
      },
      {
        id: "tool_hated",
        label: "Is there a tool you really don't like using — but can't seem to replace?",
        help: "Software, a spreadsheet, a paper system, whatever.",
        field: { kind: "text", placeholder: "QuickBooks Desktop, for example…" }
      },
      {
        id: "tool_hated_why",
        label: "What specifically frustrates you about it?",
        help: "Skip if nothing comes to mind for the last one.",

const SECTION_COUNT = SECTIONS.filter(s => !s.kind).length;

/* ---------- state ---------- */
const STORAGE = "alongside-ai-intake-v2";
let state = { cur: 0, answers: {} };
try{
  const raw = localStorage.getItem(STORAGE);
  if(raw){
    const parsed = JSON.parse(raw);
    if(parsed && typeof parsed === "object") state = Object.assign(state, parsed);
  }
}catch(e){}

// Purge any stale v1 storage so the old form's data doesn't bleed in.
try{ localStorage.removeItem("alongside-ai-intake-v1"); }catch(e){}

function save(){
  try{ localStorage.setItem(STORAGE, JSON.stringify(state)); }catch(e){}
}
function clearState(){
  try{ localStorage.removeItem(STORAGE); }catch(e){}
}

/* ---------- render ---------- */
const app = document.getElementById("app");
const progressWrap = document.getElementById("progress-wrap");
const progressFill = document.getElementById("progress-fill");
const progressLabel = document.getElementById("progress-label");
const progressPct = document.getElementById("progress-pct");

function sectionIndex(stepIdx){
  // 1-based index of the current section among content sections (skips intro/done).
  let n = 0;
  for(let i=0;i<=stepIdx;i++){
    if(!SECTIONS[i].kind) n++;
  }
  return n;
}

function updateProgress(){
  const step = SECTIONS[state.cur];
  if(step.kind){
    progressWrap.style.display = "none";
    return;
  }
  progressWrap.style.display = "block";
  const sn = sectionIndex(state.cur);
  const pct = Math.round((sn - 1) / SECTION_COUNT * 100);
  progressFill.style.width = pct + "%";
  progressLabel.textContent = `Section ${sn} of ${SECTION_COUNT}`;
  progressPct.textContent = sn === 1 ? "Just getting started" : `${pct}% through`;
}

function escapeHtml(s){
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

function renderIntro(){
  app.innerHTML = `
    <div class="card intro-card view">
      <div class="step-kicker">Before we begin</div>
      <h1 class="section-title">Tell us about how you work. We'll write you a plan.</h1>
      <p class="section-intro">Seven short sections of plain-English questions. Most people take about 20 to 25 minutes. You can skip any question that doesn't feel right, and we'll save your place if you need to step away. When you're done, we'll email you a plan written for your situation within two business days — no call required, no obligation.</p>
      <div class="intro-bullets">
        <div class="intro-bullet"><div class="n">—</div><div>No account to create. No password to remember.</div></div>
        <div class="intro-bullet"><div class="n">—</div><div>Skip anything that doesn't feel right. Only your first name and an email at the end are required.</div></div>
        <div class="intro-bullet"><div class="n">—</div><div>Your answers stay private. We use them only to write your plan.</div></div>
      </div>
      <div class="card-footer">
        <button class="btn btn-primary" id="start-btn">
          Let's begin
          <svg width="12" height="12" viewBox="0 0 10 10" fill="none"><path d="M1 5h8m-3-3 3 3-3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  `;
  document.getElementById("start-btn").addEventListener("click", next);
}

function renderDone(){
  const firstName = (state.answers.name || "").trim().split(/\s+/)[0] || "you";
  app.innerHTML = `
    <div class="card done-card view">
      <div class="done-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m4 12 5 5L20 6"/></svg>
      </div>
      <div class="step-kicker">All set</div>
      <h1 class="section-title">Thank you, ${escapeHtml(firstName)}. Your plan is on the way.</h1>
      <p class="section-intro">We'll read through your answers carefully and send back a plan written for your situation within two business days. It'll land in the inbox you gave us. If something pops into your head in the meantime — the fifteenth thing you forgot to mention — just reply to that email. It comes straight to us.</p>

      <div class="done-detail">
        <h4>What happens next</h4>
        <ul>
          <li>We read every answer carefully, not just the checkboxes.</li>
          <li>You'll get a plan you can keep, whether you decide to continue or not.</li>
          <li>If you want help actually setting things up, there's a short call we can schedule — but only if you want one.</li>
          <li>If your situation isn't one we can help with, we'll say so, and point you toward someone who can.</li>
        </ul>
      </div>

      <div class="card-footer" style="margin-top:36px">
        <a class="btn btn-ghost" href="/">
          <span class="arrow-l">
            <svg width="12" height="12" viewBox="0 0 10 10" fill="none"><path d="M1 5h8m-3-3 3 3-3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          Back to homepage
        </a>
      </div>
    </div>
  `;
}

function questionHTML(q){
  const val = state.answers[q.id];
  const f = q.field;
  const required = q.required ? `<span class="q-required">Required</span>` : "";
  const help = q.help ? `<span class="q-help">${escapeHtml(q.help)}</span>` : "";

  let fieldHTML = "";
  if(f.kind === "text" || f.kind === "email"){
    const inputType = f.kind === "email" ? "email" : "text";
    fieldHTML = `<input class="input" type="${inputType}" data-qid="${q.id}" placeholder="${escapeHtml(f.placeholder || "")}" value="${escapeHtml(val || "")}" ${f.autofocus ? "data-autofocus" : ""}/>`;
  }
  else if(f.kind === "textarea"){
    fieldHTML = `<textarea class="input" data-qid="${q.id}" placeholder="${escapeHtml(f.placeholder || "")}">${escapeHtml(val || "")}</textarea>`;
  }
  else if(f.kind === "radio" || f.kind === "checkbox"){
    const isCheck = f.kind === "checkbox";
    const current = isCheck ? (Array.isArray(val) ? val : []) : val;
    const gridClass = f.options.length > 4 ? "choice-grid" : (f.options.length <= 2 ? "choice-grid single" : "choice-grid");
    fieldHTML = `<div class="${gridClass}" data-qid="${q.id}">
      ${f.options.map(o => {
        const checked = isCheck ? current.includes(o.value) : current === o.value;
        return `<label class="choice">
          <input type="${isCheck ? "checkbox" : "radio"}" name="${q.id}" value="${escapeHtml(o.value)}" ${checked ? "checked" : ""}/>
          <span class="check ${isCheck ? "square" : ""}"></span>
          <span class="body"><strong>${escapeHtml(o.label)}</strong>${o.hint ? `<small>${escapeHtml(o.hint)}</small>` : ""}</span>
        </label>`;
      }).join("")}
    </div>`;
  }

  const hiddenAttr = q.hidden ? "style=\"display:none\"" : "";
  return `
    <div class="question" data-question="${q.id}" ${hiddenAttr}>
      <span class="q-label">${escapeHtml(q.label)}${required}</span>
      ${help}
      ${fieldHTML}
    </div>
  `;
}

function renderSection(step){
  const sn = sectionIndex(state.cur);
  const isLast = state.cur === SECTIONS.length - 2;

  const questionsHTML = step.questions.map(questionHTML).join("");

  app.innerHTML = `
    <div class="card view">
      <div class="step-kicker">${escapeHtml(step.kicker)}</div>
      <h1 class="section-title">${escapeHtml(step.title)}</h1>
      ${step.intro ? `<p class="section-intro">${escapeHtml(step.intro)}</p>` : ""}
      ${questionsHTML}
      <div class="card-footer">
        <button class="btn btn-ghost" id="back-btn" ${state.cur <= 1 ? "style='visibility:hidden'" : ""}>
          <span class="arrow-l">
            <svg width="12" height="12" viewBox="0 0 10 10" fill="none"><path d="M1 5h8m-3-3 3 3-3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          Back
        </button>
        <button class="btn btn-primary" id="next-btn">
          ${isLast ? "Send my answers" : `Continue to section ${sn + 1}`}
          <svg width="12" height="12" viewBox="0 0 10 10" fill="none"><path d="M1 5h8m-3-3 3 3-3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="skip-note">Skip any question that doesn't feel right.</div>
    </div>
  `;

  // Wire field listeners
  step.questions.forEach(q => {
    const f = q.field;

    if(f.kind === "text" || f.kind === "email" || f.kind === "textarea"){
      const input = app.querySelector(`[data-qid="${q.id}"]`);
      if(!input) return;
      input.addEventListener("input", e => {
        state.answers[q.id] = e.target.value;
        save();
        refreshReveal(step);
        refreshNextEnabled(step);
      });
      if(f.autofocus){ setTimeout(()=>input.focus(), 50); }
    }
    else if(f.kind === "radio"){
      const container = app.querySelector(`[data-qid="${q.id}"]`);
      if(!container) return;
      container.querySelectorAll("input").forEach(inp => {
        inp.addEventListener("change", () => {
          state.answers[q.id] = inp.value;
          save();
          refreshReveal(step);
          refreshNextEnabled(step);
        });
      });
    }
    else if(f.kind === "checkbox"){
      const container = app.querySelector(`[data-qid="${q.id}"]`);
      if(!container) return;
      container.querySelectorAll("input").forEach(inp => {
        inp.addEventListener("change", () => {
          const boxes = [...container.querySelectorAll("input:checked")].map(b => b.value);
          state.answers[q.id] = boxes;
          save();
          refreshReveal(step);
          refreshNextEnabled(step);
        });
      });
    }
  });

  document.getElementById("back-btn").addEventListener("click", prev);
  document.getElementById("next-btn").addEventListener("click", tryNext);

  refreshReveal(step);
  refreshNextEnabled(step);
  scrollToTop();
}

function refreshReveal(step){
  // Show/hide questions that have a revealIf condition.
  step.questions.forEach(q => {
    if(!q.revealIf) return;
    const ref = state.answers[q.revealIf.field];
    const show = Array.isArray(ref)
      ? ref.includes(q.revealIf.equals)
      : ref === q.revealIf.equals;
    const el = app.querySelector(`[data-question="${q.id}"]`);
    if(el) el.style.display = show ? "" : "none";
  });
}

function sectionRequiredSatisfied(step){
  return step.questions.every(q => {
    if(!q.required) return true;
    // If the required field is currently hidden by revealIf, don't block.
    if(q.revealIf){
      const ref = state.answers[q.revealIf.field];
      const visible = Array.isArray(ref)
        ? ref.includes(q.revealIf.equals)
        : ref === q.revealIf.equals;
      if(!visible) return true;
    }
    const v = state.answers[q.id];
    if(q.field.kind === "email"){
      return typeof v === "string" && /^\S+@\S+\.\S+$/.test(v.trim());
    }
    if(q.field.kind === "radio") return !!v;
    if(q.field.kind === "checkbox") return Array.isArray(v) && v.length > 0;
    return typeof v === "string" && v.trim().length > 0;
  });
}

function refreshNextEnabled(step){
  const btn = document.getElementById("next-btn");
  if(!btn) return;
  btn.disabled = !sectionRequiredSatisfied(step);
}

function tryNext(){
  const step = SECTIONS[state.cur];
  if(step.kind){ next(); return; }
  if(!sectionRequiredSatisfied(step)) return;
  if(state.cur === SECTIONS.length - 2){
    submitToNetlify();
    return;
  }
  next();
}

/* ---------- Netlify Forms submission ---------- */
function submitToNetlify(){
  const btn = document.getElementById("next-btn");
  if(btn){ btn.disabled = true; btn.innerHTML = "Sending…"; }

  const fd = new FormData();
  fd.append("form-name", "questionnaire");
  Object.keys(state.answers).forEach(k => {
    const v = state.answers[k];
    fd.append(k, Array.isArray(v) ? v.join(", ") : (v == null ? "" : String(v)));
  });

  fetch("/", {
    method: "POST",
    body: fd
  })
  .then(res => {
    console.log("[questionnaire] submit status:", res.status, res.statusText);
    if(!res.ok) throw new Error("Submit failed: " + res.status);
    // Advance to the done screen first, then clear storage — otherwise next()'s save()
    // would immediately rewrite it and a page refresh would resume on the done screen
    // with stale answers from a submission that's already been sent.
    next();
    clearState();
  })
  .catch(err => {
    console.error("[questionnaire] submit error:", err);
    if(btn){
      btn.disabled = false;
      btn.innerHTML = `Try again <svg width="12" height="12" viewBox="0 0 10 10" fill="none"><path d="M1 5h8m-3-3 3 3-3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }
    alert("Sorry — something went wrong sending your answers. Please try once more, and if it still won't go through, email mark@alongsideai.ai and we'll take it from there.");
  });
}

function next(){
  if(state.cur < SECTIONS.length - 1){
    state.cur++;
    save();
    render();
  }
}
function prev(){
  if(state.cur > 0){
    state.cur--;
    save();
    render();
  }
}
function scrollToTop(){
  window.scrollTo({top:0, behavior:"smooth"});
}

function render(){
  const step = SECTIONS[state.cur];
  if(step.kind === "intro") renderIntro();
  else if(step.kind === "done") renderDone();
  else renderSection(step);
  updateProgress();
}

render();
</script>
